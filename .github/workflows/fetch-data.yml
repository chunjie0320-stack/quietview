name: Fetch Quietview Data

on:
  schedule:
    # 北京时间 08:00 → UTC 00:00
    - cron: '0 0 * * *'
    # 北京时间 12:00 → UTC 04:00
    - cron: '0 4 * * *'
    # 北京时间 18:00 → UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch all data
        env:
          WX_TOKEN: ${{ secrets.WX_TOKEN }}
          WX_COOKIE: ${{ secrets.WX_COOKIE }}
        run: |
          cd $GITHUB_WORKSPACE
          python3 scripts/fetch_all.py

      - name: Commit and push data
        run: |
          git config user.name "quietview-bot"
          git config user.email "bot@quietview.me"
          git add data/
          git diff --staged --quiet || git commit -m "auto: fetch data $(date -u +'%Y.%m.%d %H:%M') UTC"
          git push
