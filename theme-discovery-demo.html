#app {

/* ===== PAGE TRANSITION ===== */
.page {
  width: 100%;
  min-height: 100vh;
  transition: opacity 0.3s ease;
}

.page.hidden {
  display: none;
  opacity: 0;
}

.page.visible {
  display: block;
  opacity: 1;
}

.home-title {

.home-emoji {

  transition: transform 0.15s ease, box-shadow 0.15s ease;
  border: 1px solid #f0f0f0;
  overflow: hidden;
}

.theme-card:active {

}

.theme-card:last-child {

}

.card-image.lunch {

.card-image.tea {

.card-image.dinner {

.card-image.supper {

.card-info {

function showPage(page, themeId) {
  var homePage = document.getElementById('home-page');
  var themePage = document.getElementById('theme-page');

  if (page === 'home') {
    themePage.classList.add('hidden');
    themePage.classList.remove('visible');
    homePage.classList.remove('hidden');
    homePage.classList.add('visible');
    window.scrollTo(0, 0);
  } else if (page === 'theme' && themeId) {
    var data = themes[themeId];
    if (!data) return;

    // Update hero bg
    var heroBg = document.getElementById('hero-bg');
    heroBg.className = 'hero-bg ' + data.colorClass;

    // Update time tag and title
    document.getElementById('hero-time-tag').textContent = data.timeLabel;
    document.getElementById('hero-main-title').textContent = data.title;

    // Update tips
    document.getElementById('tips-name').textContent = data.tips.name;
    document.getElementById('tips-text').textContent = data.tips.text;

    // Build merchant list
    var listEl = document.getElementById('merchant-list');
    var html = '';
    // 供给来源标注（仅有 supplyInfo 时显示）
    if (data.supplyInfo) {
      html += '<div class="supply-badge">';
      html += '<span class="supply-icon">🔗</span>';
      html += '<span>供给来自 <b>韦恩筛选集 #' + data.supplyInfo.collectorId + '</b> · ' + data.supplyInfo.skuNum + ' 个商品</span>';
      html += '<div class="supply-filters">' + data.supplyInfo.filters + '</div>';
      html += '</div>';
    }
    for (var i = 0; i < data.merchants.length; i++) {
      var m = data.merchants[i];
      html += '<div class="merchant-card">';
      html += '<div class="merchant-img ' + data.colorClass + '">' + m.emoji + '</div>';
      html += '<div class="merchant-info">';
      html += '<div class="merchant-name">' + m.name + '</div>';
      html += '<div class="merchant-meta">' + m.category + ' · ' + m.city + ' · 人均' + m.price + '</div>';
      html += '<div class="merchant-tags">';
      html += '<span class="tag-rate">好评 ' + m.rate + '</span>';
      if (m.tag) html += '<span class="tag-discount">' + m.tag + '</span>';
      html += '<span class="tag-good">对胃了！</span>';
      html += '</div>';
      html += '<div class="merchant-reason">' + m.reason + '</div>';
      html += '</div>';
      html += '</div>';
    }
    listEl.innerHTML = html;

    // Switch page
    homePage.classList.add('hidden');
    homePage.classList.remove('visible');
    themePage.classList.remove('hidden');
    themePage.classList.add('visible');
    window.scrollTo(0, 0);
  }
}
