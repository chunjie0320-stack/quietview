<html lang="zh-CN">

<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #333; }

  .header {
    background: linear-gradient(135deg, #ff6034, #ff8c00);
    color: white;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(255,96,52,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .logo { font-size: 28px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }

    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .card-title {
    font-size: 13px;
    color: #999;
    font-weight: 500;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .user-list { display: flex; flex-direction: column; gap: 8px; }
  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .user-item:hover { background: #fff5f2; }
  .user-item.active { background: #fff0ec; border-color: #ff6034; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .user-name { font-size: 14px; font-weight: 500; }
  .user-desc { font-size: 12px; color: #999; margin-top: 1px; }

  /* 画像标签展示 */
  .profile-section { }
  .profile-loading {
    text-align: center;
    padding: 20px;
    color: #bbb;
    font-size: 13px;
  }
  .label-group { margin-bottom: 12px; }
  .label-group-title {
    font-size: 12px;
    color: #666;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .label-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .label-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: #f0f4ff;
    color: #4a6cf7;
    cursor: default;
  }
  .label-tag.preference { background: #fff0ec; color: #ff6034; }
  .label-tag.behavior { background: #f0faf5; color: #2db47d; }
  .label-tag.sensitivity { background: #fdf5ff; color: #9b59b6; }

  /* 右侧：搜索区 */
  .main { display: flex; flex-direction: column; gap: 16px; }

  .search-box {
    background: white;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    height: 44px;
    border: 2px solid #e8e8e8;
    border-radius: 22px;
    padding: 0 18px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #ff6034; }
  .search-btn {
    height: 44px;
    padding: 0 24px;
    background: #ff6034;
    color: white;
    border: none;
    border-radius: 22px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #e54f28; }
  .search-btn:disabled { background: #ccc; cursor: not-allowed; }

  .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .quick-tag {
    padding: 5px 14px;
    background: #f5f5f5;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    color: #555;
  }
  .quick-tag:hover { background: #fff0ec; color: #ff6034; }

  /* 搜索提示条 */
  .search-insight {
    background: linear-gradient(135deg, #fff8f5, #fff);
    border: 1px solid #ffe0d6;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #666;
    display: none;
  }
  .search-insight.show { display: block; }
  .search-insight strong { color: #ff6034; }

  /* 商品网格 */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .results-count { font-size: 13px; color: #999; }
  .sort-label { font-size: 12px; color: #bbb; }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .product-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
  }
  .product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  .product-img {
    width: 100%; height: 130px;
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    background: linear-gradient(135deg, #fff8f5, #ffeee8);
  }
  .product-body { padding: 10px 12px; }
  .product-name { font-size: 13px; font-weight: 500; line-height: 1.4; color: #222; margin-bottom: 4px; }
  .product-shop { font-size: 11px; color: #999; margin-bottom: 6px; }
  .product-bottom { display: flex; align-items: center; justify-content: space-between; }
  .product-price { color: #ff6034; font-size: 15px; font-weight: 600; }
  .product-price span { font-size: 11px; font-weight: 400; }
  .product-rating { font-size: 11px; color: #faad14; }
  .product-sales { font-size: 11px; color: #bbb; margin-top: 2px; }

  /* 推荐理由 badge */
  .recommend-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(255,96,52,0.9);
    color: white;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 排序 badge */
  .rank-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;

  .rank-1 { background: #ff6034; }
  .rank-2 { background: #ff9500; }
  .rank-3 { background: #ffd600; color: #333; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #ccc;

  .empty-state p { font-size: 14px; }

  .loading-state {

    padding: 40px 20px;
    color: #bbb;
    font-size: 14px;

  .compare-btn {
    padding: 6px 14px;
    background: #f0f4ff;
    color: #4a6cf7;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;

  .compare-btn:hover { background: #dde6ff; }

  .compare-panel {
    display: none;
    background: white;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    margin-top: 16px;

  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .compare-col h4 { font-size: 13px; color: #666; margin-bottom: 10px; }
  .compare-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; }
  .compare-rank { width: 20px; height: 20px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #666; flex-shrink: 0; }
  .compare-name { font-size: 12px; color: #333; }
  .compare-score { margin-left: auto; font-size: 12px; color: #ff6034; font-weight: 500; }

  </div>
</div>

        quality: { "大众": 2.0, "精品": 1.0 }
      },
      categoryBonus: { "超值": 2.0, "快餐": 1.8 }
    }
  },
  {
    name: "学妹",
    desc: "三线城市·在校学生",
    emoji: "👩‍🎓",
    persona: {
      searchQueries: ["价格敏感", "奶茶偏好", "外卖偏好"],
      weights: {
        health: { "健康": 1.2, "普通": 1.5 },
        price: { "低价": 3.0, "中价": 1.2, "高价": 0.4 },
        quality: { "大众": 2.5, "精品": 0.8 }
      },
      categoryBonus: { "超值": 2.5, "学生": 2.0, "奶茶": 1.8 }
    }
  }
];

// ===================== 状态 =====================
let currentUserIdx = 0;
let currentKeyword = "汉堡";
let personaLabels = {}; // { userIdx: [labels] }
let compareVisible = false;

// ===================== 初始化 =====================
window.onload = function() {
  loadPersonaLabels(0);
  // 搜索框回车
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
};

// ===================== 用户选择 =====================
function selectUser(idx) {
  currentUserIdx = idx;
  document.querySelectorAll('.user-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  loadPersonaLabels(idx);

  // 如果已有搜索结果，重新渲染
  if (currentKeyword && document.getElementById('productsContainer').querySelector('.product-card')) {
    doSearch();
  }
}

// ===================== 加载 Persona 标签（调用真实接口） =====================
async function loadPersonaLabels(idx) {
  if (personaLabels[idx]) {
    renderProfile(idx);
    return;
  }

  const user = USERS[idx];
  document.getElementById('profileContent').innerHTML = '<div class="profile-loading">🔄 从 Persona 接口获取中...</div>';
  document.getElementById('profileSource').textContent = '';

  try {
    // 并发搜索该用户的多个维度标签
    const queries = user.persona.searchQueries;
    const results = await Promise.all(
      queries.map(q =>
        fetch(`/api/v2/ai/rag/dutvs/assets/searchAll?query=${encodeURIComponent(q)}&assetTypes=label&pageSize=3&idType=1`, {
          credentials: 'include'
        }).then(r => r.json()).then(d => ({ query: q, labels: d.data || [] }))
      )
    );

    // 整理标签分组
    const labelGroups = [];
    results.forEach(({ query, labels }) => {
      if (labels.length > 0) {
        labelGroups.push({
          title: query,
          labels: labels.slice(0, 3).map(l => ({
            id: l.id,
            name: l.assetName,
            similarity: l.similarity
          }))
        });
      }
    });

    personaLabels[idx] = labelGroups;
    document.getElementById('profileSource').textContent = '· Persona 真实接口';
    renderProfile(idx);

  } catch(e) {
    document.getElementById('profileContent').innerHTML = '<div class="profile-loading" style="color:#f56">接口请求失败，请检查登录状态</div>';
  }
}

// ===================== 渲染用户画像 =====================
function renderProfile(idx) {
  const user = USERS[idx];
  const groups = personaLabels[idx] || [];
  const typeClasses = ['preference', 'behavior', 'sensitivity'];

  let html = '';
  groups.forEach((group, gi) => {
    html += `<div class="label-group">
      <div class="label-group-title">🏷️ ${group.title}</div>
      <div class="label-tags">
        ${group.labels.map(l => `<span class="label-tag ${typeClasses[gi] || ''}" title="ID:${l.id} 相似度:${(l.similarity*100).toFixed(0)}%">${l.name}</span>`).join('')}
      </div>
    </div>`;
  });

  if (!html) html = '<div class="profile-loading">暂无标签数据</div>';
  document.getElementById('profileContent').innerHTML = html;
}

// ===================== 搜索主逻辑 =====================
function quickSearch(keyword) {
  document.getElementById('searchInput').value = keyword;
  doSearch();
}

function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return;

  currentKeyword = keyword;
  const user = USERS[currentUserIdx];
  const container = document.getElementById('productsContainer');
  const insight = document.getElementById('searchInsight');

  // 过滤匹配关键词的商品
  const matched = PRODUCTS.filter(p =>
    p.keywords.some(k => k.includes(keyword) || keyword.includes(k)) ||
    p.name.includes(keyword) ||
    p.categories.some(c => c.includes(keyword))
  );

  if (matched.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">😅</div><p>没有找到"${keyword}"相关商品</p></div>`;
    insight.className = 'search-insight';
    document.getElementById('compareBtn').style.display = 'none';
    document.getElementById('resultsCount').textContent = '';
    return;
  }

  // 个性化评分（基于画像权重）
  const scored = matched.map(p => {
    let score = 1.0;
    const w = user.persona.weights;

    // 价格权重
    if (w.price && p.tags.price) score *= (w.price[p.tags.price] || 1.0);
    // 健康权重
    if (w.health && p.tags.health) score *= (w.health[p.tags.health] || 1.0);
    // 品质权重
    if (w.quality && p.tags.quality) score *= (w.quality[p.tags.quality] || 1.0);
    // 品类加成
    const bonus = user.persona.categoryBonus || {};
    p.categories.forEach(c => {
      if (bonus[c]) score *= bonus[c];
    });
    p.keywords.forEach(k => {
      if (bonus[k]) score *= bonus[k];
    });

    // 基础销量加成（轻微）
    score *= (1 + Math.log10(p.sales + 1) * 0.05);

    return { ...p, score };
  }).sort((a, b) => b.score - a.score);

  // 展示搜索洞察
  const topLabel = scored[0];
  const whyText = getRecommendReason(scored[0], user);
  insight.innerHTML = `🎯 基于 <strong>${user.name}</strong> 的画像标签，为她个性化排序了 <strong>${scored.length}</strong> 件商品 · 首推：<strong>${topLabel.name}</strong>（${whyText}）`;
  insight.className = 'search-insight show';

  // 渲染商品卡片
  document.getElementById('resultsCount').textContent = `共 ${scored.length} 件商品`;
  document.getElementById('compareBtn').style.display = 'block';

  container.innerHTML = `<div class="products-grid">
    ${scored.map((p, i) => renderProductCard(p, i, user)).join('')}
  </div>`;
}

function getRecommendReason(product, user) {
  const reasons = [];
  if (product.tags.health === '健康' && user.persona.weights.health?.['健康'] > 1.5) reasons.push('健康偏好匹配');
  if (product.tags.price === '低价' && user.persona.weights.price?.['低价'] > 2.0) reasons.push('超值优惠');
  if (product.tags.quality === '精品' && user.persona.weights.quality?.['精品'] > 1.5) reasons.push('品质优先');
  if (product.categories.some(c => (user.persona.categoryBonus?.[c] || 0) > 1.5)) reasons.push('品类偏好');
  return reasons.length ? reasons.join(' · ') : '综合评分最高';
}

function renderProductCard(product, rank, user) {
  const reason = getRecommendReason(product, user);
  const rankBadge = rank < 3 ? `<div class="rank-badge rank-${rank+1}">${rank+1}</div>` : '';
  const recBadge = rank < 3 ? `<div class="recommend-badge">✨ ${reason}</div>` : '';

  return `<div class="product-card">
    ${recBadge}
    ${rankBadge}
    <div class="product-img">${product.emoji}</div>
    <div class="product-body">
      <div class="product-name">${product.name}</div>
      <div class="product-shop">${product.shop}</div>
      <div class="product-bottom">
        <div>
          <div class="product-price"><span>¥</span>${product.price}</div>
          <div class="product-sales">月售 ${product.sales.toLocaleString()}</div>
        </div>
        <div class="product-rating">⭐ ${product.rating}</div>
      </div>
    </div>
  </div>`;
}

// ===================== 对比面板 =====================
function toggleCompare() {
  compareVisible = !compareVisible;
  const panel = document.getElementById('comparePanel');
  panel.classList.toggle('show', compareVisible);
  document.getElementById('compareBtn').textContent = compareVisible ? '收起对比 ↑' : '对比不同用户结果 →';

  if (compareVisible) renderCompare();
}

function renderCompare() {
  const keyword = currentKeyword;
  const grid = document.getElementById('compareGrid');

  const allResults = USERS.map((user, idx) => {
    const matched = PRODUCTS.filter(p =>
      p.keywords.some(k => k.includes(keyword) || keyword.includes(k)) ||
      p.name.includes(keyword) ||
      p.categories.some(c => c.includes(keyword))
    );
    const scored = matched.map(p => {
      let score = 1.0;
      const w = user.persona.weights;
      if (w.price && p.tags.price) score *= (w.price[p.tags.price] || 1.0);
      if (w.health && p.tags.health) score *= (w.health[p.tags.health] || 1.0);
      if (w.quality && p.tags.quality) score *= (w.quality[p.tags.quality] || 1.0);
      const bonus = user.persona.categoryBonus || {};
      p.categories.forEach(c => { if (bonus[c]) score *= bonus[c]; });
      p.keywords.forEach(k => { if (bonus[k]) score *= bonus[k]; });
      score *= (1 + Math.log10(p.sales + 1) * 0.05);
      return { ...p, score };
    }).sort((a, b) => b.score - a.score);
    return { user, results: scored };
  });

  grid.innerHTML = allResults.map(({ user, results }) => `
    <div class="compare-col">
      <h4>${user.emoji} ${user.name}（${user.desc}）的排序</h4>
      ${results.slice(0, 5).map((p, i) => `
        <div class="compare-item">
          <div class="compare-rank">${i+1}</div>
          <div class="compare-name">${p.name}</div>
          <div class="compare-score">¥${p.price}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}
</script>
